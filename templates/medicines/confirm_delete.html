{% extends 'base.html' %}
{% block title %}Confirm Delete – RxManager{% endblock %}

{% block content %}
<div class="card" style="max-width:480px;margin:3rem auto">
  <div class="card-body text-center p-5">
    <div style="font-size:3rem;color:#f87171;margin-bottom:1rem"><i class="bi bi-exclamation-triangle-fill"></i></div>
    <h4>Delete {{ object_type }}?</h4>
    <p class="text-muted">You are about to delete <strong>{{ object }}</strong>. This action cannot be undone.</p>
    <form method="post" class="d-flex gap-2 justify-content-center mt-3">
      {% csrf_token %}
      <button type="submit" class="btn btn-danger"><i class="bi bi-trash me-2"></i>Yes, Delete</button>
      <a href="{% url cancel_url %}" class="btn btn-secondary">Cancel</a>
    </form>
  </div>
</div>
{% endblock %}
